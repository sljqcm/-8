<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模板图片合成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvasContainer { touch-action: none; user-select: none; }
        canvas { 
            border: 1px solid #ddd; cursor: move;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), 
                              linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee);
            background-size: 20px 20px; background-position: 0 0, 10px 10px; 
        }
        /* 缩略图选中样式 */
        .template-active { border-color: #4f46e5; ring: 2px; ring-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl flex flex-col md:flex-row max-w-6xl w-full overflow-hidden">
        
        <div class="w-full md:w-80 p-6 border-r border-gray-100 space-y-6 overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800">图片遮罩工具</h1>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-3">1. 选择预设模板</label>
                <div class="grid grid-cols-2 gap-2" id="presetList">
                    </div>
                <div class="mt-2 text-[10px] text-gray-400">或者：<input type="file" id="tpl" class="mt-1 block w-full text-xs"></div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">2. 上传你的照片</label>
                <input type="file" id="img" accept="image/*" class="text-sm block w-full">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">图片缩放 (<span id="zoomVal">100</span>%)</label>
                <input type="range" id="zoomRange" min="10" max="300" value="100" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <button id="download" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                保存合并图片
            </button>
        </div>

        <div class="flex-1 bg-gray-200 p-4 flex items-center justify-center" id="canvasContainer">
            <canvas id="canvas" width="800" height="800" class="max-w-full h-auto shadow-lg"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const presetList = document.getElementById('presetList');
        const tplInput = document.getElementById('tpl');
        const imgInput = document.getElementById('img');
        const zoomRange = document.getElementById('zoomRange');
        const zoomVal = document.getElementById('zoomVal');

        // --- 配置区：在此添加你的固定模板地址 ---
        const PRESETS = [
            { id: 'google1', name: '炫彩圆环', url: 'GoogleOne.png' }, // 你之前的那个文件
            { id: 'google2', name: '渐变柔和', url: 'GoogleOne_Soft.png' } // 刚刚生成的那个带过渡的文件
        ];

        let templateImg = null;
        let userImg = null;
        let imgState = { x: 400, y: 400, scale: 1.0, isDragging: false, startX: 0, startY: 0, baseScale: 1.0 };

        // 1. 初始化模板选择 UI
        function initPresets() {
            PRESETS.forEach((preset, index) => {
                const btn = document.createElement('div');
                btn.className = `cursor-pointer border-2 border-transparent rounded-lg overflow-hidden hover:border-indigo-300 transition ${index === 0 ? 'template-active' : ''}`;
                btn.innerHTML = `<img src="${preset.url}" class="w-full h-20 object-cover" title="${preset.name}">`;
                btn.onclick = () => {
                    // 切换选中状态样式
                    document.querySelectorAll('#presetList div').forEach(d => d.classList.remove('template-active'));
                    btn.classList.add('template-active');
                    loadTemplate(preset.url);
                };
                presetList.appendChild(btn);
            });
            // 默认加载第一个
            loadTemplate(PRESETS[0].url);
        }

        function loadTemplate(url) {
            templateImg = new Image();
            templateImg.src = url;
            templateImg.onload = render;
        }

        // 2. 自定义模板上传监听
        tplInput.onchange = e => {
            const file = e.target.files[0];
            if (file) loadTemplate(URL.createObjectURL(file));
        };

        // 3. 用户照片上传监听
        imgInput.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            userImg = new Image();
            userImg.src = URL.createObjectURL(file);
            userImg.onload = () => {
                imgState.x = canvas.width / 2;
                imgState.y = canvas.height / 2;
                imgState.baseScale = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
                imgState.scale = imgState.baseScale;
                render();
            };
        };

        // 4. 核心渲染函数
        function render() {
            if (!templateImg) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // A. 开启圆形裁剪 (遮蔽外圈)
            ctx.save();
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) / 2, 0, Math.PI * 2);
            ctx.clip();

            // B. 画照片
            if (userImg) {
                const w = userImg.width * imgState.scale;
                const h = userImg.height * imgState.scale;
                ctx.drawImage(userImg, imgState.x - w / 2, imgState.y - h / 2, w, h);
            }
            ctx.restore();

            // C. 处理模板透明度并覆盖
            // (这里保留你之前的像素过滤逻辑，防止模板图本身不透明)
            const tCanvas = document.createElement('canvas');
            tCanvas.width = canvas.width; tCanvas.height = canvas.height;
            const tCtx = tCanvas.getContext('2d');
            tCtx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);
            
            const imgData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 200 && data[i+1] > 200 && data[i+2] > 200) data[i+3] = 0; // 粗略抠除白色
            }
            tCtx.putImageData(imgData, 0, 0);
            
            ctx.drawImage(tCanvas, 0, 0);
        }

        // 5. 交互：缩放与拖拽 (保持之前的逻辑)
        zoomRange.oninput = e => {
            if (!userImg) return;
            zoomVal.innerText = e.target.value;
            imgState.scale = imgState.baseScale * (e.target.value / 100);
            render();
        };

        canvas.onmousedown = e => { imgState.isDragging = true; updatePos(e); };
        window.onmousemove = e => { 
            if (!imgState.isDragging || !userImg) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            imgState.x += (mouseX - imgState.startX);
            imgState.y += (mouseY - imgState.startY);
            updatePos(e);
            render();
        };
        window.onmouseup = () => imgState.isDragging = false;

        function updatePos(e) {
            const rect = canvas.getBoundingClientRect();
            imgState.startX = (e.clientX - rect.left) * (canvas.width / rect.width);
            imgState.startY = (e.clientY - rect.top) * (canvas.height / rect.height);
        }

        document.getElementById('download').onclick = () => {
            const a = document.createElement('a');
            a.download = 'my_review_avatar.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        };

        // 启动
        initPresets();
    </script>
</body>
</html>
