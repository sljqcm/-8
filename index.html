<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自动抠图合成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvasContainer { touch-action: none; user-select: none; }
        canvas { border: 1px solid #ddd; background-image: 
            linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), 
            linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee);
            background-size: 20px 20px; background-position: 0 0, 10px 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl flex flex-col md:flex-row max-w-5xl w-full overflow-hidden">
        
        <div class="w-full md:w-80 p-6 border-r border-gray-100 space-y-6">
            <h1 class="text-xl font-bold text-gray-800">图片遮罩工具</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">1. 上传圆环模板</label>
                    <input type="file" id="tpl" accept="image/*" class="text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">2. 上传用户照片</label>
                    <input type="file" id="img" accept="image/*" class="text-sm">
                </div>
            </div>

            <button id="download" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                合并并下载结果
            </button>

            <div class="text-xs text-gray-400 bg-gray-50 p-3 rounded">
                💡 自动处理说明：系统会自动识别模板中的“四色圆环”，并将中间的白色或灰色背景设为完全透明。
            </div>
        </div>

        <div class="flex-1 bg-gray-200 p-4 flex items-center justify-center" id="canvasContainer">
            <canvas id="canvas" width="800" height="800" class="max-w-full h-auto shadow-lg"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tplInput = document.getElementById('tpl');
        const imgInput = document.getElementById('img');
        const downloadBtn = document.getElementById('download');

        let templateImg = null;
        let userImg = null;

        // 设置用户图片在模板中的位置（可根据你的模板自行调整）
        const target = { x: 0, y: 0, width: 800, height: 800 };

        // 1. 上传模板
        tplInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            templateImg = new Image();
            templateImg.src = URL.createObjectURL(file);
            templateImg.onload = render;
        });

        // 2. 上传内容图
        imgInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            userImg = new Image();
            userImg.src = URL.createObjectURL(file);
            userImg.onload = render;
        });

        // 3. 核心渲染逻辑
        function render() {
            if (!templateImg) return;

            // 以模板图尺寸为准
            canvas.width = templateImg.width;
            canvas.height = templateImg.height;
            target.width = canvas.width;
            target.height = canvas.height;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ① 先画用户图片（放在底层）
            if (userImg) {
                drawCover(userImg, target);
            }

            // ② 在内存中处理模板（强行去除背景）
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(templateImg, 0, 0);

            const imgData = tCtx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            // 像素过滤算法
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];

                // 逻辑：如果 RGB 三值非常接近（灰色/白色/黑色），则视为背景
                // 这里设置阈值为颜色差异小于 30，且亮度高于 120（避开深色圆环）
                const isGrayish = Math.abs(r - g) < 30 && Math.abs(g - b) < 30 && Math.abs(r - b) < 30;
                const isBright = r > 120 && g > 120 && b > 120;

                if (isGrayish && isBright) {
                    data[i + 3] = 0; // 设为完全透明
                }
            }
            
            tCtx.putImageData(imgData, 0, 0);

            // ③ 最后把处理好的圆环盖在照片上
            ctx.drawImage(tempCanvas, 0, 0);
        }

        // 等比填充函数
        function drawCover(img, t) {
            const ir = img.width / img.height;
            const tr = t.width / t.height;
            let w, h, x, y;

            if (ir > tr) {
                h = t.height;
                w = h * ir;
            } else {
                w = t.width;
                h = w / ir;
            }

            x = t.x - (w - t.width) / 2;
            y = t.y - (h - t.height) / 2;
            ctx.drawImage(img, x, y, w, h);
        }

        // 下载功能
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.download = 'ai_output.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
    </script>
</body>
</html>
