<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>图片合成工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>图片合成工具</h2>

<input type="file" id="upload" multiple accept="image/*">

<div>
    <button onclick="setMode('horizontal')">横向拼接</button>
    <button onclick="setMode('vertical')">纵向拼接</button>
    <button onclick="mergeImages()">开始合成</button>
</div>

<div id="preview"></div>

<canvas id="canvas"></canvas>

<button id="downloadBtn" style="display:none;">下载图片</button>

<script src="script.js"></script>
</body>
</html>
